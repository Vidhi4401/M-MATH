<!DOCTYPE html>
<html>
<head>

<title>M-MATH Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/static/dashboard.css">

</head>

<body>
<div class="navbar">

<div class="nav-left">

<h2>M - MATH</h2>
<span class="role">ADMIN</span>

</div>

<img src="/static/logo.png" class="nav-logo">

</div>




<div class="container">

<!-- CREATE CLASS ALWAYS AVAILABLE -->

<div class="card">

<h3>Create Class</h3>

<form action="/create-class" method="post">

<input name="name" placeholder="Enter Class Name" required>

<button>Create Class</button>

</form>

</div>


<!-- CREATE SUBJECT -->

<div class="card">

<h3>Create Subject</h3>

<form action="/create-subject" method="post">

<input name="name" placeholder="Enter Subject Name" required>

<select name="class_id" required>

<option value="">Select Class</option>

{% for c in classes %}

<option value="{{c.id}}">
{{c.name}}
</option>

{% endfor %}

</select>

<button>Create Subject</button>

</form>

</div>


<!-- CREATE CHAPTER -->

<div class="card">

<h3>Create Chapter</h3>

<form action="/create-chapter" method="post">

<input name="name" placeholder="Enter Chapter Name" required>

<select name="subject_id" required>

<option value="">Select Subject</option>

{% for c in classes %}
{% for s in c.subjects %}

<option value="{{s.id}}">
{{c.name}} - {{s.name}}
</option>

{% endfor %}
{% endfor %}

</select>

<button>Create Chapter</button>

</form>

</div>


<!-- UPLOAD NOTE -->

<div class="card">

<h3>Upload Note</h3>

<form action="/upload-note" method="post" enctype="multipart/form-data">

<input name="title" placeholder="Note Title" required>

<select name="chapter_id" required>

<option value="">Select Chapter</option>

{% for c in classes %}
{% for s in c.subjects %}
{% for ch in s.chapters %}

<option value="{{ch.id}}">
{{c.name}} - {{s.name}} - {{ch.name}}
</option>

{% endfor %}
{% endfor %}
{% endfor %}

</select>

<input type="file" name="file" required>

<button>Upload Note</button>

</form>

</div>




<!-- DELETE CLASS CARD -->

<div class="card">

<h3>Delete Class</h3>

<form method="get" action="" onsubmit="this.action='/delete-class/' + this.class_id.value">

<select name="class_id" required>

<option value="">Select Class</option>

{% for c in classes %}
<option value="{{c.id}}">
{{c.name}}
</option>
{% endfor %}

</select>

<button type="submit" class="delete">
Delete Class
</button>

</form>

</div>



<!-- DELETE SUBJECT CARD -->

<div class="card">

<h3>Delete Subject</h3>

<form method="get" action="" onsubmit="this.action='/delete-subject/' + this.subject_id.value">

<select name="subject_id" required>

<option value="">Select Subject</option>

{% for c in classes %}
{% for s in c.subjects %}
<option value="{{s.id}}">
{{c.name}} - {{s.name}}
</option>
{% endfor %}
{% endfor %}

</select>

<button type="submit" class="delete">
Delete Subject
</button>

</form>

</div>



<!-- DELETE CHAPTER CARD -->

<div class="card">

<h3>Delete Chapter</h3>

<form method="get" action="" onsubmit="this.action='/delete-chapter/' + this.chapter_id.value">

<select name="chapter_id" required>

<option value="">Select Chapter</option>

{% for c in classes %}
{% for s in c.subjects %}
{% for ch in s.chapters %}
<option value="{{ch.id}}">
{{c.name}} - {{s.name}} - {{ch.name}}
</option>
{% endfor %}
{% endfor %}
{% endfor %}

</select>

<button type="submit" class="delete">
Delete Chapter
</button>

</form>

</div>



<!-- DELETE NOTE CARD -->

<div class="card">

<h3>Delete Note</h3>

<form method="get" action="" onsubmit="this.action='/delete-note/' + this.note_id.value">

<select name="note_id" required>

<option value="">Select Note</option>

{% for c in classes %}
{% for s in c.subjects %}
{% for ch in s.chapters %}
{% for n in ch.notes %}
<option value="{{n.id}}">
{{c.name}} - {{s.name}} - {{ch.name}} - {{n.title}}
</option>
{% endfor %}
{% endfor %}
{% endfor %}
{% endfor %}

</select>

<button type="submit" class="delete">
Delete Note
</button>

</form>

</div>


</body>
</html>
